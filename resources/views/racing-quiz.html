<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏁 Racing Quiz Game</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
/* ── Reset & Base ── */
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#1a1a2e;font-family:'Nunito',sans-serif;color:#fff;overflow-x:hidden}

/* ── Layout ── */
.game{display:flex;flex-direction:column;min-height:100vh;max-width:820px;margin:0 auto;padding:16px;gap:12px}

/* ── Header scoreboard ── */
.scoreboard{
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  border-radius:16px;padding:12px 20px;
  backdrop-filter:blur(8px);
}
.team-info{display:flex;flex-direction:column;align-items:center;gap:2px}
.team-name{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;opacity:.7}
.team-score{font-family:'Boogaloo',sans-serif;font-size:42px;line-height:1}
.team-score.a{color:#ff6b35}
.team-score.b{color:#00b4d8}
.vs-badge{font-family:'Boogaloo',sans-serif;font-size:22px;opacity:.4}

/* ── Track Container ── */
.track-wrap{
  position:relative;border-radius:16px;overflow:hidden;
  border:2px solid rgba(255,255,255,.12);
  box-shadow:0 8px 32px rgba(0,0,0,.5);
}

/* Sky strip */
.sky{
  height:36px;background:linear-gradient(180deg,#0d1b2a 0%,#1a3a5c 100%);
  display:flex;align-items:center;padding:0 16px;gap:8px;overflow:hidden;position:relative;
}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle 2s infinite alternate}
@keyframes twinkle{from{opacity:.2}to{opacity:1}}

/* Road */
.road{
  position:relative;height:130px;overflow:hidden;
  background:#2d2d2d;
}
/* Canvas fills entire road - drawn via JS */
#road-canvas{
  position:absolute;inset:0;width:100%;height:100%;
  pointer-events:none;
}

/* Lane divider - asphalt texture rows */
.lane-a{position:absolute;top:0;left:0;right:0;height:50%;background:rgba(0,0,0,.15)}
.lane-b{position:absolute;bottom:0;left:0;right:0;height:50%;background:rgba(0,0,0,.05)}

/* Shoulder lines */
.shoulder-top,.shoulder-bot{position:absolute;left:0;right:0;height:5px;background:#f4a261}
.shoulder-top{top:0}
.shoulder-bot{bottom:0}

/* Finish line */
.finish{
  position:absolute;top:0;right:0;bottom:0;width:26px;
  background:repeating-linear-gradient(180deg,#fff 0,#fff 13px,#000 13px,#000 26px);
  opacity:.85;z-index:10;
}
.finish::before{
  content:'🏁';position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-size:20px;
}

/* ── Car tracks (one per team) ── */
.car-track{
  position:absolute;left:0;right:26px;display:flex;align-items:center;
  height:50%;
}
.car-track.a{top:0}
.car-track.b{bottom:0}

/* The car wrapper – position via JS */
.car-wrap{
  position:absolute;left:0;
  display:flex;align-items:center;gap:4px;
  transition:left .5s cubic-bezier(.34,1.4,.64,1);
  will-change:left;
  z-index:5;
}
.car-btn{
  background:none;border:none;cursor:pointer;padding:0;
  display:flex;align-items:center;gap:4px;
}
.car-svg{
  width:72px;height:36px;
  filter:drop-shadow(2px 2px 4px rgba(0,0,0,.6));
  /* Idle bounce */
  animation:idle-bounce .7s ease-in-out infinite alternate;
}
.car-svg.turbo{
  animation:turbo-shake .08s linear infinite;
}
@keyframes idle-bounce{from{transform:translateY(0)}to{transform:translateY(-3px)}}
@keyframes turbo-shake{
  0%{transform:translateY(0) rotate(-.4deg)}
  25%{transform:translateY(-2px) rotate(.4deg)}
  50%{transform:translateY(-1px) rotate(0)}
  75%{transform:translateY(-3px) rotate(-.3deg)}
  100%{transform:translateY(-1px) rotate(.2deg)}
}

/* Dust particles */
.dust{position:absolute;pointer-events:none;z-index:4}
.dust-p{
  position:absolute;border-radius:50%;background:rgba(180,150,100,.55);
  animation:dust-fly .6s ease-out forwards;
  width:6px;height:6px;
}
@keyframes dust-fly{
  0%{transform:translate(0,0) scale(1);opacity:.8}
  100%{transform:translate(-30px,-10px) scale(2.5);opacity:0}
}

/* Speed lines */
.speed-lines{
  position:absolute;inset:0;pointer-events:none;z-index:3;overflow:hidden;opacity:0;transition:opacity .2s;
}
.speed-lines.active{opacity:1}
.speed-line{
  position:absolute;height:1px;background:linear-gradient(90deg,rgba(255,255,255,.35),transparent);
  animation:speed-line .25s linear infinite;
}
@keyframes speed-line{from{transform:translateX(100%)}to{transform:translateX(-200%)}}

/* ── Progress bars ── */
.progress-wrap{
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
  border-radius:12px;padding:10px 16px;display:flex;flex-direction:column;gap:6px;
}
.prog-row{display:flex;align-items:center;gap:10px}
.prog-label{font-size:11px;font-weight:700;width:52px;opacity:.7}
.prog-bar{flex:1;height:10px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;transition:width .5s cubic-bezier(.34,1.4,.64,1);position:relative}
.prog-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 60%,rgba(255,255,255,.3));animation:shimmer 1.5s infinite}
@keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
.prog-fill.a{background:linear-gradient(90deg,#ff6b35,#ff9f1c)}
.prog-fill.b{background:linear-gradient(90deg,#00b4d8,#48cae4)}
.prog-val{font-size:12px;font-weight:700;min-width:36px;text-align:right;opacity:.8}

/* ── Action buttons ── */
.controls{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn{
  font-family:'Nunito',sans-serif;font-size:14px;font-weight:900;
  padding:10px 24px;border-radius:12px;cursor:pointer;border:none;
  transition:transform .1s,box-shadow .1s;letter-spacing:.02em;
}
.btn:hover{transform:translateY(-2px)}
.btn:active{transform:scale(.94)}
.btn-a{
  background:linear-gradient(135deg,#ff6b35,#ff9f1c);color:#fff;
  box-shadow:0 4px 16px rgba(255,107,53,.4);
}
.btn-b{
  background:linear-gradient(135deg,#00b4d8,#0077b6);color:#fff;
  box-shadow:0 4px 16px rgba(0,180,216,.4);
}
.btn-next{
  background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);
  box-shadow:0 4px 12px rgba(0,0,0,.3);
}
.btn-next:hover{background:rgba(255,255,255,.18)}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}

/* ── Question card ── */
.question-card{
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);
  border-radius:16px;padding:18px 22px;
  position:relative;overflow:hidden;
  backdrop-filter:blur(8px);
}
.question-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,#ff6b35,#00b4d8);
}
.q-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.q-num{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  background:rgba(255,255,255,.1);padding:3px 10px;border-radius:99px;opacity:.7}
.q-type-badge{font-size:10px;padding:3px 9px;border-radius:99px;font-weight:700}
.q-type-badge.has-img{background:rgba(99,179,237,.2);color:#63b3ed}
.q-type-badge.has-audio{background:rgba(104,211,145,.2);color:#68d391}
.q-type-badge.text-only{background:rgba(255,255,255,.08);color:rgba(255,255,255,.5)}

.q-media{margin-bottom:12px;border-radius:10px;overflow:hidden}
.q-media img{width:100%;max-height:240px;object-fit:cover;display:block;border-radius:10px}
.q-media audio{width:100%;margin-top:4px}
.q-audio-box{
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px;
}
.q-audio-icon{font-size:22px}
.q-audio-label{font-size:13px;opacity:.7;flex:1}

.q-text{font-size:17px;font-weight:700;line-height:1.55;color:#fff}
.q-hint{font-size:12px;opacity:.5;margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.08)}

/* ── Winner screen ── */
.winner-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;
  display:flex;align-items:center;justify-content:center;
  animation:fadein .4s ease;
}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.winner-box{
  background:#1a1a2e;border-radius:24px;padding:40px 48px;text-align:center;
  border:2px solid;position:relative;overflow:hidden;
  animation:pop .45s cubic-bezier(.34,1.56,.64,1);
  max-width:400px;width:90%;
}
@keyframes pop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.winner-box.a{border-color:#ff6b35;box-shadow:0 0 60px rgba(255,107,53,.3)}
.winner-box.b{border-color:#00b4d8;box-shadow:0 0 60px rgba(0,180,216,.3)}
.confetti-strip{position:absolute;top:0;left:0;right:0;height:6px;
  background:repeating-linear-gradient(90deg,#ff6b35,#ff9f1c,#00b4d8,#48cae4,#ff6b35)}
.winner-trophy{font-size:64px;margin-bottom:8px;animation:trophy-bounce .6s ease-in-out infinite alternate}
@keyframes trophy-bounce{from{transform:scale(1) rotate(-3deg)}to{transform:scale(1.08) rotate(3deg)}}
.winner-title{font-family:'Boogaloo',sans-serif;font-size:36px;margin-bottom:4px}
.winner-title.a{color:#ff6b35}
.winner-title.b{color:#00b4d8}
.winner-sub{font-size:14px;opacity:.6;margin-bottom:20px}
.btn-reset{
  font-family:'Nunito',sans-serif;font-size:14px;font-weight:900;
  padding:10px 28px;border-radius:12px;cursor:pointer;border:none;
  background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.2);
  transition:transform .1s;
}
.btn-reset:hover{transform:scale(1.04);background:rgba(255,255,255,.2)}

/* ── Floating +1 toast ── */
.float-toast{
  position:fixed;font-family:'Boogaloo',sans-serif;font-size:28px;pointer-events:none;z-index:50;
  animation:float-up .8s ease-out forwards;
}
@keyframes float-up{
  0%{transform:translateY(0) scale(1);opacity:1}
  100%{transform:translateY(-80px) scale(1.4);opacity:0}
}
</style>
</head>
<body>

<div class="game" id="app">

  <!-- Scoreboard -->
  <div class="scoreboard">
    <div class="team-info">
      <span class="team-name">🚗 Đội A</span>
      <span class="team-score a" id="score-a">0</span>
    </div>
    <span class="vs-badge">VS</span>
    <div class="team-info">
      <span class="team-name">🚙 Đội B</span>
      <span class="team-score b" id="score-b">0</span>
    </div>
  </div>

  <!-- Track -->
  <div class="track-wrap">
    <!-- Sky with stars -->
    <div class="sky" id="sky"></div>

    <!-- Road -->
    <div class="road" id="road">
      <canvas id="road-canvas"></canvas>
      <div class="shoulder-top"></div>
      <div class="shoulder-bot"></div>

      <!-- Speed lines per lane -->
      <div class="speed-lines" id="speed-a" style="top:0;height:50%"></div>
      <div class="speed-lines" id="speed-b" style="bottom:0;height:50%"></div>

      <!-- Car A track -->
      <div class="car-track a">
        <div class="car-wrap" id="car-wrap-a" style="left:0">
          <div class="dust" id="dust-a"></div>
          <button class="car-btn" onclick="advance('a')" title="Đội A +1">
            <!-- Car A SVG -->
            <svg class="car-svg" id="car-svg-a" viewBox="0 0 120 52" fill="none" xmlns="http://www.w3.org/2000/svg">
              <!-- Body shadow -->
              <ellipse cx="60" cy="46" rx="46" ry="5" fill="rgba(0,0,0,.4)"/>
              <!-- Exhaust smoke -->
              <circle cx="8" cy="30" r="3" fill="rgba(200,200,200,.3)" id="exhaust-a1"/>
              <!-- Wheels -->
              <circle cx="28" cy="40" r="9" fill="#222"/><circle cx="28" cy="40" r="5" fill="#555"/>
              <circle cx="88" cy="40" r="9" fill="#222"/><circle cx="88" cy="40" r="5" fill="#555"/>
              <!-- Wheel shine -->
              <circle cx="26" cy="38" r="2" fill="rgba(255,255,255,.3)"/>
              <circle cx="86" cy="38" r="2" fill="rgba(255,255,255,.3)"/>
              <!-- Car body -->
              <rect x="10" y="20" width="100" height="22" rx="6" fill="#e85d04"/>
              <rect x="10" y="20" width="100" height="10" rx="6" fill="#ff7043"/>
              <!-- Cabin -->
              <rect x="30" y="8" width="56" height="16" rx="6" fill="#cc4a00"/>
              <!-- Windows -->
              <rect x="34" y="10" width="22" height="12" rx="4" fill="#90e0f5" opacity=".85"/>
              <rect x="60" y="10" width="22" height="12" rx="4" fill="#90e0f5" opacity=".85"/>
              <!-- Window shine -->
              <rect x="35" y="11" width="8" height="4" rx="2" fill="rgba(255,255,255,.5)"/>
              <!-- Headlight -->
              <ellipse cx="112" cy="28" rx="5" ry="4" fill="#ffe066"/>
              <ellipse cx="112" cy="28" rx="3" ry="2.5" fill="#fff"/>
              <!-- Tail light -->
              <rect x="9" y="25" width="4" height="8" rx="2" fill="#ff1744"/>
              <!-- Side stripe -->
              <rect x="10" y="28" width="100" height="3" rx="1.5" fill="rgba(255,255,255,.25)"/>
              <!-- Number -->
              <text x="58" y="35" text-anchor="middle" font-family="Boogaloo,sans-serif" font-size="11" fill="#fff" font-weight="bold">A</text>
            </svg>
          </button>
        </div>
      </div>

      <!-- Car B track -->
      <div class="car-track b">
        <div class="car-wrap" id="car-wrap-b" style="left:0">
          <div class="dust" id="dust-b"></div>
          <button class="car-btn" onclick="advance('b')" title="Đội B +1">
            <!-- Car B SVG -->
            <svg class="car-svg" id="car-svg-b" viewBox="0 0 120 52" fill="none" xmlns="http://www.w3.org/2000/svg">
              <ellipse cx="60" cy="46" rx="46" ry="5" fill="rgba(0,0,0,.4)"/>
              <circle cx="28" cy="40" r="9" fill="#222"/><circle cx="28" cy="40" r="5" fill="#444"/>
              <circle cx="88" cy="40" r="9" fill="#222"/><circle cx="88" cy="40" r="5" fill="#444"/>
              <circle cx="26" cy="38" r="2" fill="rgba(255,255,255,.3)"/>
              <circle cx="86" cy="38" r="2" fill="rgba(255,255,255,.3)"/>
              <rect x="10" y="20" width="100" height="22" rx="6" fill="#0077b6"/>
              <rect x="10" y="20" width="100" height="10" rx="6" fill="#0096c7"/>
              <rect x="30" y="8" width="56" height="16" rx="6" fill="#005f8a"/>
              <rect x="34" y="10" width="22" height="12" rx="4" fill="#90e0f5" opacity=".85"/>
              <rect x="60" y="10" width="22" height="12" rx="4" fill="#90e0f5" opacity=".85"/>
              <rect x="35" y="11" width="8" height="4" rx="2" fill="rgba(255,255,255,.5)"/>
              <ellipse cx="112" cy="28" rx="5" ry="4" fill="#ffe066"/>
              <ellipse cx="112" cy="28" rx="3" ry="2.5" fill="#fff"/>
              <rect x="9" y="25" width="4" height="8" rx="2" fill="#ff1744"/>
              <rect x="10" y="28" width="100" height="3" rx="1.5" fill="rgba(255,255,255,.25)"/>
              <text x="58" y="35" text-anchor="middle" font-family="Boogaloo,sans-serif" font-size="11" fill="#fff" font-weight="bold">B</text>
            </svg>
          </button>
        </div>
      </div>

      <div class="finish"></div>
    </div>
  </div>

  <!-- Progress bars -->
  <div class="progress-wrap">
    <div class="prog-row">
      <span class="prog-label">🚗 Đội A</span>
      <div class="prog-bar"><div class="prog-fill a" id="prog-a" style="width:0%"></div></div>
      <span class="prog-val" id="pval-a">0/20</span>
    </div>
    <div class="prog-row">
      <span class="prog-label">🚙 Đội B</span>
      <div class="prog-bar"><div class="prog-fill b" id="prog-b" style="width:0%"></div></div>
      <span class="prog-val" id="pval-b">0/20</span>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-a" id="btn-a" onclick="advance('a')">🚗 +1 Đội A</button>
    <button class="btn btn-next" id="btn-next" onclick="nextQuestion()">▶ Câu tiếp theo</button>
    <button class="btn btn-b" id="btn-b" onclick="advance('b')">🚙 +1 Đội B</button>
  </div>

  <!-- Question card -->
  <div class="question-card" id="question-card"></div>

</div>

<script>
// ══════════════════════════════════════════════════
// DATA — thay bằng output từ Laravel blade @json
// Cấu trúc MySQL: id, question, hint, image_url, audio_url
// ══════════════════════════════════════════════════
const QUESTIONS = [
  {
    id:1,
    question:"Nghe đoạn nhạc sau và cho biết đây là bản nhạc của nhạc sĩ nào?",
    hint:"🎵 Nhạc cụ dân tộc Việt Nam",
    image_url:null,
    audio_url:"https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"
  },
  {
    id:2,
    question:"Đây là công trình kiến trúc nổi tiếng ở đâu?",
    hint:"🏛️ Một di sản thế giới tại Việt Nam",
    image_url:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/1b/Temple_of_Literature_Hanoi_1.jpg/640px-Temple_of_Literature_Hanoi_1.jpg",
    audio_url:null
  },
  {
    id:3,
    question:"Thủ đô của Việt Nam là gì?",
    hint:"🏙️ Miền Bắc Việt Nam",
    image_url:null,
    audio_url:null
  },
  {
    id:4,
    question:"2 + 2 × 2 = ?",
    hint:"⚠️ Chú ý thứ tự phép tính",
    image_url:null,
    audio_url:null
  },
  {
    id:5,
    question:"Con vật nào là biểu tượng của năm 2024?",
    hint:"🐉 Theo lịch Á Đông",
    image_url:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8c/Nuvola_Chinese_dragon.svg/320px-Nuvola_Chinese_dragon.svg.png",
    audio_url:null
  },
  {
    id:6,
    question:"Nguyên tố hóa học nào có ký hiệu Au?",
    hint:"⚗️ Quý giá và sáng bóng",
    image_url:null,
    audio_url:null
  },
  {
    id:7,
    question:"Hành tinh nào gần Mặt Trời nhất?",
    hint:"🪐 Hành tinh đầu tiên trong hệ mặt trời",
    image_url:null,
    audio_url:null
  },
  {
    id:8,
    question:"Ai vẽ bức tranh 'Mona Lisa'?",
    hint:"🎨 Nghệ sĩ phục hưng Ý vĩ đại",
    image_url:null,
    audio_url:null
  }
];

const TOTAL = 20;
let state = {posA:0, posB:0, qIdx:0, gameOver:false};

// ══════════════════════════════════════════════════
// CANVAS ROAD — smooth pixel-perfect scroll
// ══════════════════════════════════════════════════
const canvas = document.getElementById('road-canvas');
const ctx = canvas.getContext('2d');
let roadOffset = 0;
let roadTargetSpeed = 2;   // px per frame normal
let roadCurrentSpeed = 2;
const DASH_LEN = 32, GAP_LEN = 22, DASH_CYCLE = DASH_LEN + GAP_LEN;

function resizeCanvas(){
  canvas.width = canvas.offsetWidth * devicePixelRatio;
  canvas.height = canvas.offsetHeight * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);
}

function drawRoad(){
  const W = canvas.offsetWidth, H = canvas.offsetHeight;
  ctx.clearRect(0, 0, W, H);

  // Lane A background (top half, slightly darker)
  ctx.fillStyle = 'rgba(0,0,0,0.14)';
  ctx.fillRect(0, 0, W, H/2);

  // Subtle asphalt grain lines (vertical texture)
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  const grainSpacing = 14;
  const grainPhase = roadOffset % grainSpacing;
  for(let x = -grainPhase; x < W + grainSpacing; x += grainSpacing){
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }

  // Center dashed line — key fix: use translate so no jumpy background-position
  const dashPhase = roadOffset % DASH_CYCLE;
  const cy = H / 2;
  ctx.save();
  ctx.translate(-dashPhase, 0);
  ctx.strokeStyle = 'rgba(255,255,255,0.42)';
  ctx.lineWidth = 3;
  ctx.setLineDash([DASH_LEN, GAP_LEN]);
  ctx.lineDashOffset = 0;
  ctx.beginPath();
  ctx.moveTo(0, cy);
  ctx.lineTo(W + DASH_CYCLE, cy);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function roadLoop(){
  // Smooth speed lerp
  roadCurrentSpeed += (roadTargetSpeed - roadCurrentSpeed) * 0.08;
  roadOffset += roadCurrentSpeed;
  if(roadOffset > 9999999) roadOffset = 0;
  drawRoad();
  requestAnimationFrame(roadLoop);
}

function setRoadSpeed(fast){
  roadTargetSpeed = fast ? 14 : 2;
}

window.addEventListener('resize', ()=>{
  resizeCanvas();
  updateCarPos('a'); updateCarPos('b');
});
resizeCanvas();
roadLoop();

// ══════════════════════════════════════════════════
// WEB AUDIO ENGINE — no external files needed
// ══════════════════════════════════════════════════
let audioCtx = null;

function getAudio(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

// Engine idle hum (looping oscillator-based)
const engineNodes = {};

function startEngine(team){
  const ac = getAudio();
  if(engineNodes[team]) return;

  // Base rumble oscillator
  const osc = ac.createOscillator();
  const gainNode = ac.createGain();
  const distortion = ac.createWaveShaper();

  // Waveshaper for engine "grit"
  const curve = new Float32Array(256);
  for(let i=0;i<256;i++){
    const x = (i*2)/256 - 1;
    curve[i] = (Math.PI + 200) * x / (Math.PI + 200 * Math.abs(x));
  }
  distortion.curve = curve;

  osc.type = 'sawtooth';
  osc.frequency.value = team==='a' ? 52 : 44; // A slightly higher pitch
  gainNode.gain.value = 0.08;

  osc.connect(distortion);
  distortion.connect(gainNode);
  gainNode.connect(ac.destination);
  osc.start();

  engineNodes[team] = {osc, gainNode};
}

function stopEngine(team){
  if(!engineNodes[team]) return;
  const {osc, gainNode} = engineNodes[team];
  gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.3);
  setTimeout(()=>{ try{osc.stop()}catch(e){} delete engineNodes[team]; }, 500);
}

function revEngine(team){
  if(!engineNodes[team]) return;
  const {osc, gainNode} = engineNodes[team];
  const ac = getAudio();
  const baseFreq = team==='a' ? 52 : 44;
  // Rev up
  osc.frequency.cancelScheduledValues(ac.currentTime);
  osc.frequency.setValueAtTime(baseFreq, ac.currentTime);
  osc.frequency.linearRampToValueAtTime(baseFreq * 3.2, ac.currentTime + 0.08);
  osc.frequency.exponentialRampToValueAtTime(baseFreq * 1.4, ac.currentTime + 0.35);
  osc.frequency.exponentialRampToValueAtTime(baseFreq, ac.currentTime + 0.7);

  gainNode.gain.cancelScheduledValues(ac.currentTime);
  gainNode.gain.setValueAtTime(0.08, ac.currentTime);
  gainNode.gain.linearRampToValueAtTime(0.18, ac.currentTime + 0.08);
  gainNode.gain.linearRampToValueAtTime(0.08, ac.currentTime + 0.5);
}

// Tyre squeal — short pitched chirp
function playSqueal(){
  const ac = getAudio();
  const osc = ac.createOscillator();
  const g = ac.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(900, ac.currentTime);
  osc.frequency.exponentialRampToValueAtTime(400, ac.currentTime + 0.18);
  g.gain.setValueAtTime(0.12, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.2);
  osc.connect(g); g.connect(ac.destination);
  osc.start(); osc.stop(ac.currentTime + 0.22);
}

// Crowd cheer — noise burst
function playCrowd(){
  const ac = getAudio();
  const bufLen = ac.sampleRate * 0.6;
  const buf = ac.createBuffer(1, bufLen, ac.sampleRate);
  const data = buf.getChannelData(0);
  for(let i=0;i<bufLen;i++) data[i]=(Math.random()*2-1)*0.3;
  const src = ac.createBufferSource();
  const filter = ac.createBiquadFilter();
  filter.type='bandpass'; filter.frequency.value=800; filter.Q.value=0.8;
  const g = ac.createGain();
  g.gain.setValueAtTime(0, ac.currentTime);
  g.gain.linearRampToValueAtTime(0.22, ac.currentTime+0.05);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+0.6);
  src.buffer=buf; src.connect(filter); filter.connect(g); g.connect(ac.destination);
  src.start();
}

// Win fanfare
function playFanfare(){
  const ac = getAudio();
  const notes = [523,659,784,1047]; // C5 E5 G5 C6
  notes.forEach((freq,i)=>{
    const osc = ac.createOscillator();
    const g = ac.createGain();
    osc.type='triangle'; osc.frequency.value=freq;
    const t = ac.currentTime + i*0.13;
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(0.18,t+0.05);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.35);
    osc.connect(g); g.connect(ac.destination);
    osc.start(t); osc.stop(t+0.38);
  });
}

// Next question "ding"
function playDing(){
  const ac = getAudio();
  const osc = ac.createOscillator();
  const g = ac.createGain();
  osc.type='sine'; osc.frequency.value=660;
  g.gain.setValueAtTime(0.15, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+0.4);
  osc.connect(g); g.connect(ac.destination);
  osc.start(); osc.stop(ac.currentTime+0.42);
}

// Road rumble (ambient, starts on first interaction)
let roadRumbleNode = null;
function startRoadRumble(){
  if(roadRumbleNode) return;
  const ac = getAudio();
  const osc = ac.createOscillator();
  const g = ac.createGain();
  const filter = ac.createBiquadFilter();
  filter.type='lowpass'; filter.frequency.value=120;
  osc.type='sawtooth'; osc.frequency.value=28;
  g.gain.value=0.04;
  osc.connect(filter); filter.connect(g); g.connect(ac.destination);
  osc.start();
  roadRumbleNode = {osc, g};
}


// ══════════════════════════════════════════════════
// Stars
// ══════════════════════════════════════════════════
const sky = document.getElementById('sky');
for(let i=0;i<18;i++){
  const s = document.createElement('div');
  s.className='star';
  s.style.cssText=`width:${1+Math.random()*2}px;height:${1+Math.random()*2}px;
    left:${Math.random()*98}%;top:${4+Math.random()*70}%;
    animation-delay:${Math.random()*2}s;animation-duration:${1.5+Math.random()*2}s`;
  sky.appendChild(s);
}

// ══════════════════════════════════════════════════
// Speed lines setup
// ══════════════════════════════════════════════════
function buildSpeedLines(el){
  for(let i=0;i<6;i++){
    const l=document.createElement('div');
    l.className='speed-line';
    l.style.cssText=`top:${10+i*14}%;width:${60+Math.random()*30}%;
      animation-delay:${Math.random()*0.25}s;animation-duration:${0.15+Math.random()*0.15}s`;
    el.appendChild(l);
  }
}
buildSpeedLines(document.getElementById('speed-a'));
buildSpeedLines(document.getElementById('speed-b'));

// ══════════════════════════════════════════════════
// Dust particles
// ══════════════════════════════════════════════════
function spawnDust(team){
  const container = document.getElementById('dust-'+team);
  container.innerHTML='';
  for(let i=0;i<5;i++){
    const p=document.createElement('div');
    p.className='dust-p';
    p.style.cssText=`
      left:${-4+Math.random()*-8}px;
      top:${8+Math.random()*16}px;
      animation-delay:${i*0.05}s;
      width:${4+Math.random()*6}px;
      height:${4+Math.random()*6}px;
    `;
    container.appendChild(p);
    setTimeout(()=>p.remove(), 700);
  }
}

// ══════════════════════════════════════════════════
// Car position
// ══════════════════════════════════════════════════
function getCarLeft(pos){
  const road = document.getElementById('road');
  const trackWidth = road.offsetWidth - 26 - 80; // minus finish line & car width
  return Math.min(pos / TOTAL * trackWidth, trackWidth);
}

function updateCarPos(team){
  const pos = team==='a'?state.posA:state.posB;
  const wrap = document.getElementById('car-wrap-'+team);
  wrap.style.left = getCarLeft(pos)+'px';
}

// ══════════════════════════════════════════════════
// Advance car
// ══════════════════════════════════════════════════
function advance(team){
  if(state.gameOver) return;

  const before = team==='a'?state.posA:state.posB;
  if(before >= TOTAL) return;

  // Init audio on first user gesture
  startRoadRumble();
  startEngine('a');
  startEngine('b');

  if(team==='a') state.posA = Math.min(state.posA+1, TOTAL);
  else state.posB = Math.min(state.posB+1, TOTAL);

  // Turbo animation
  const svg = document.getElementById('car-svg-'+team);
  svg.classList.add('turbo');
  setTimeout(()=>svg.classList.remove('turbo'), 500);

  // Speed lines
  const sl = document.getElementById('speed-'+team);
  sl.classList.add('active');
  setTimeout(()=>sl.classList.remove('active'), 500);

  // Road goes faster briefly
  setRoadSpeed(true);
  setTimeout(()=>setRoadSpeed(false), 650);

  // Dust
  spawnDust(team);

  // Float toast
  showToast(team);

  // Audio
  revEngine(team);
  playSqueal();
  setTimeout(()=>playCrowd(), 120);

  // Update position
  updateCarPos(team);
  updateProgress();

  // Check win
  if(state.posA >= TOTAL || state.posB >= TOTAL){
    state.gameOver = true;
    stopEngine('a'); stopEngine('b');
    setTimeout(()=>{ playFanfare(); showWinner(); }, 700);
  }
}

// ══════════════════════════════════════════════════
// Float +1 toast
// ══════════════════════════════════════════════════
function showToast(team){
  const btn = document.getElementById('btn-'+team);
  const rect = btn.getBoundingClientRect();
  const toast = document.createElement('div');
  toast.className = 'float-toast';
  toast.textContent = '+1';
  toast.style.cssText = `
    left:${rect.left + rect.width/2 - 20}px;
    top:${rect.top - 10}px;
    color:${team==='a'?'#ff6b35':'#00b4d8'};
  `;
  document.body.appendChild(toast);
  setTimeout(()=>toast.remove(), 900);
}

// ══════════════════════════════════════════════════
// Progress bars & scores
// ══════════════════════════════════════════════════
function updateProgress(){
  document.getElementById('prog-a').style.width = (state.posA/TOTAL*100)+'%';
  document.getElementById('prog-b').style.width = (state.posB/TOTAL*100)+'%';
  document.getElementById('pval-a').textContent = state.posA+'/20';
  document.getElementById('pval-b').textContent = state.posB+'/20';
  document.getElementById('score-a').textContent = state.posA;
  document.getElementById('score-b').textContent = state.posB;
}

// ══════════════════════════════════════════════════
// Render question
// ══════════════════════════════════════════════════
function renderQuestion(){
  const q = QUESTIONS[state.qIdx % QUESTIONS.length];
  const card = document.getElementById('question-card');

  let typeLabel = 'Câu hỏi';
  let typeCls = 'text-only';
  if(q.image_url && q.audio_url){ typeLabel='🖼️ 🔊 Hình + Âm'; typeCls='has-img'; }
  else if(q.image_url){ typeLabel='🖼️ Có hình ảnh'; typeCls='has-img'; }
  else if(q.audio_url){ typeLabel='🔊 Có âm thanh'; typeCls='has-audio'; }

  let mediaHTML = '';
  if(q.image_url){
    mediaHTML += `<div class="q-media"><img src="${q.image_url}" alt="Hình câu hỏi" loading="lazy"/></div>`;
  }
  if(q.audio_url){
    mediaHTML += `<div class="q-audio-box">
      <span class="q-audio-icon">🎵</span>
      <span class="q-audio-label">Nghe đoạn âm thanh</span>
      <audio controls src="${q.audio_url}" preload="none" style="flex:2;min-width:0"></audio>
    </div>`;
  }

  card.innerHTML = `
    <div class="q-meta">
      <span class="q-num">Câu ${state.qIdx + 1} / ${QUESTIONS.length}</span>
      <span class="q-type-badge ${typeCls}">${typeLabel}</span>
    </div>
    ${mediaHTML}
    <div class="q-text">${q.question}</div>
    <div class="q-hint">${q.hint}</div>
  `;
}

// ══════════════════════════════════════════════════
// Next question
// ══════════════════════════════════════════════════
function nextQuestion(){
  if(state.gameOver) return;
  state.qIdx++;
  renderQuestion();
  playDing();
  setRoadSpeed(true);
  setTimeout(()=>setRoadSpeed(false), 450);
}

// ══════════════════════════════════════════════════
// Winner
// ══════════════════════════════════════════════════
function showWinner(){
  const winner = state.posA>=TOTAL ? 'a' : 'b';
  const name = winner==='a' ? '🚗 Đội A' : '🚙 Đội B';
  const overlay = document.createElement('div');
  overlay.className = 'winner-overlay';
  overlay.innerHTML = `
    <div class="winner-box ${winner}">
      <div class="confetti-strip"></div>
      <div class="winner-trophy">🏆</div>
      <div class="winner-title ${winner}">${name}</div>
      <p class="winner-sub">Đã về đích sau ${state.qIdx+1} câu hỏi!</p>
      <button class="btn-reset" onclick="resetGame()">🔄 Chơi lại</button>
    </div>
  `;
  document.body.appendChild(overlay);
}

// ══════════════════════════════════════════════════
// Reset
// ══════════════════════════════════════════════════
function resetGame(){
  state = {posA:0, posB:0, qIdx:0, gameOver:false};
  const overlay = document.querySelector('.winner-overlay');
  if(overlay) overlay.remove();
  stopEngine('a'); stopEngine('b');
  updateProgress();
  updateCarPos('a');
  updateCarPos('b');
  renderQuestion();
  setRoadSpeed(false);
}

// ══════════════════════════════════════════════════
// Init
// ══════════════════════════════════════════════════
window.addEventListener('load', ()=>{
  renderQuestion();
  updateProgress();
});
</script>
